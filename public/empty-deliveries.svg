<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
  
  <!-- Milk bottle body -->
  <path d="M80 75 L80 145 Q80 155 90 155 L110 155 Q120 155 120 145 L120 75 L115 55 Q113 48 100 48 Q87 48 85 55 Z" fill="#DCFCE7" stroke="#4ADE80" stroke-width="2"/>
  
  <!-- Bottle cap -->
  <rect x="90" y="42" width="20" height="10" rx="3" fill="#22C55E" stroke="#16A34A" stroke-width="1.5"/>
  
  <!-- Bottle neck -->
  <path d="M90 55 L90 65 L110 65 L110 55" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.5"/>
  
  <!-- Label on bottle -->
  <rect x="86" y="95" width="28" height="30" rx="3" fill="white" stroke="#4ADE80" stroke-width="1"/>
  <text x="100" y="110" font-family="Arial" font-size="8" font-weight="600" fill="#16A34A" text-anchor="middle">MILK</text>
  <line x1="92" y1="116" x2="108" y2="116" stroke="#BBF7D0" stroke-width="1"/>
  
  <!-- Milk level inside bottle -->
  <path d="M82 100 L82 143 Q82 153 90 153 L110 153 Q118 153 118 143 L118 100 Z" fill="#F0FDF4" opacity="0.6"/>
  
  <!-- Milk drop -->
  <g transform="translate(140, 80)">
    <path d="M0 -12 Q2 -6 8 2 Q8 10 0 14 Q-8 10 -8 2 Q-2 -6 0 -12 Z" fill="#86EFAC" stroke="#4ADE80" stroke-width="1.5"/>
    <ellipse cx="-2" cy="4" rx="2.5" ry="4" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Small drops -->
  <circle cx="145" cy="110" r="3" fill="#BBF7D0"/>
  <circle cx="150" cy="122" r="2" fill="#DCFCE7"/>
  
  <!-- Decorative elements -->
  <circle cx="55" cy="90" r="2" fill="#BBF7D0"/>
  <circle cx="48" cy="105" r="1.5" fill="#DCFCE7"/>
</svg>
